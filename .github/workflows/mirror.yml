name: Mirror from GitLab upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install Git LFS
        run: |
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Mirror GitLab master → GitHub main
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN_GITHUB }}
        run: |
          git clone --bare --branch master https://gitlab.com/veloren/veloren.git repo.git
          cd repo.git
          git lfs fetch --all
          git push \
            --force \
            "https://x-access-token:${MIRROR_TOKEN}@github.com/${{ github.repository }}.git" \
            "+refs/heads/master:refs/heads/main"
          git push \
            --force \
            "https://x-access-token:${MIRROR_TOKEN}@github.com/${{ github.repository }}.git" \
            --tags
