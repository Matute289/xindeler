name: Publish Docker

on:
  workflow_dispatch:

jobs:
  publish-docker:
    name: Build and push server-cli to GHCR
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        # No `lfs: true` — LFS blobs come from the self-hosted VPS, not GitHub.

      - name: Setup SSH (self-hosted VPS LFS store)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan greenmountain.dev >> ~/.ssh/known_hosts

      - name: Pull LFS assets bundled into the image (from VPS)
        run: |
          git lfs install --local
          # .lfsconfig already points lfs.url at the VPS. Pull ONLY the asset dirs the
          # Dockerfile COPYs (assets/common, assets/server, assets/world) — not the full set —
          # so this fetches from the VPS, never from GitHub.
          git lfs pull -I "assets/common,assets/server,assets/world"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y binutils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-09-08

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "server-cli-release"

      - name: Build server-cli
        env:
          VELOREN_USERDATA_STRATEGY: executable
        run: |
          cargo build --release --no-default-features --features default-publish -p veloren-server-cli
          objcopy --compress-debug-sections=zlib \
            target/release/veloren-server-cli \
            veloren-server-cli

      - name: Determine Docker tag
        id: tag
        run: |
          source ./.github/scripts/util.sh
          publishdockertag
          echo "docker_tag=${PUBLISH_DOCKER_TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        if: steps.tag.outputs.docker_tag != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.tag.outputs.docker_tag != ''
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.tag.outputs.docker_tag != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server-cli/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/veloren/server-cli:${{ steps.tag.outputs.docker_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
