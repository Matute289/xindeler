name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build release on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan greenmountain.dev >> ~/.ssh/known_hosts

      - name: Trigger build en VPS
        run: |
          ssh \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=120 \
            mgrinberg@greenmountain.dev \
            "/srv/git-lfs/scripts/build-release.sh ${{ github.ref_name }}"

      - name: Release disponible en VPS
        run: |
          echo "Release artifact: /srv/git-lfs/releases/xindeler-server-${{ github.ref_name }}.tar.gz"
          echo "Para descargar: scp mgrinberg@greenmountain.dev:/srv/git-lfs/releases/xindeler-server-${{ github.ref_name }}.tar.gz ."
